<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terror Shop - Colecionáveis</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="#" class="logo">TERROR<span>SHOP</span></a>
        
        <ul class="nav-links">
            <li><a href="#">Clássicos</a></li>
            <li><a href="#">Slasher</a></li>
            <li><a href="#">Sobrenatural</a></li>
        </ul>

        <div class="nav-actions">
            <a href="#"><i class='bx bx-search'></i></a>
            <a href="#"><i class='bx bx-user'></i></a>
            <a href="#" class="cart">
                <i class='bx bx-shopping-bag'></i>
                <span class="count" id="cart-count">0</span>
            </a>
        </div>
    </div>
</nav>

<main class="container mt-5">
    <div class="row text-center">
        
        <!-- Produto 1 -->
        <div class="col-md-4 mb-4">
            <div class="product-card card h-100">
                <div class="badge-horror">Limited</div>
                <img src="https://occ-0-8407-2219.1.nflxso.net/dnm/api/v6/E8vDc_W8CLv7-yMQu8KMEC7Rrr8/AAAABTVGjJlIal3UArZjcFxuPN1HELBAkPbuKCFcAzG65wYnMkJZxcXJkVIbZrHXqKQkbU6FbfJtTdaeqheaaW-au4XaUUSa85B6dGNt.jpg" class="card-img-top">
                <div class="card-body">
                    <h3 class="product-title">Réplica Coraline</h3>
                    <p class="product-desc">Boneca com olhos de botão.</p>
                    <div class="price-tag">R$ 199,00</div>
                    <button class="btn-buy" data-name="Réplica Coraline" data-price="199">
                        Adicionar ao Carrinho
                    </button>
                </div>
            </div>
        </div>

        <!-- Produto 2 -->
        <div class="col-md-4 mb-4">
            <div class="product-card card h-100">
                <img src="https://i.ytimg.com/vi/BXXr7dW51-Y/maxresdefault.jpg" class="card-img-top">
                <div class="card-body">
                    <h3 class="product-title">Relíquia Annabelle</h3>
                    <p class="product-desc">Cópia fiel da boneca.</p>
                    <div class="price-tag">R$ 250,00</div>
                    <button class="btn-buy" data-name="Relíquia Annabelle" data-price="250">
                        Adicionar ao Carrinho
                    </button>
                </div>
            </div>
        </div>

        <!-- Produto 3 -->
        <div class="col-md-4 mb-4">
            <div class="product-card card h-100">
                <img src="https://ingresso-a.akamaihd.net/b2b/production/uploads/article/image/4088/f8a92516206c383238e00b1cc300ab11.jpg" class="card-img-top">
                <div class="card-body">
                    <h3 class="product-title">Poster Noiva Cadáver</h3>
                    <p class="product-desc">Poster A3.</p>
                    <div class="price-tag">R$ 35,00</div>
                    <button class="btn-buy" data-name="Poster Noiva Cadáver" data-price="35">
                        Adicionar ao Carrinho
                    </button>
                </div>
            </div>
        </div>

    </div>
</main>
<div id="cart-overlay" class="cart-overlay"></div>
<div id="cart-sidebar" class="cart-sidebar">
    <div class="cart-header">
        <h4>Seu Carrinho</h4>
        <button id="close-cart">X</button>
    </div>

    <div id="cart-items"></div>

    <div class="cart-footer">
        <h5>Total: R$ <span id="cart-total">0</span></h5>
        <button class="btn btn-danger w-100">Finalizar Compra</button>
    </div>
</div>
<footer class="footer-horror">
    <div class="container text-center">
        <p>© 2025 Terror Shop</p>
    </div>
</footer>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartCount = document.getElementById('cart-count');
const cartSidebar = document.getElementById('cart-sidebar');
const cartItems = document.getElementById('cart-items');
const cartTotal = document.getElementById('cart-total');
const overlay = document.getElementById('cart-overlay');

// atualizar carrinho
function updateCart() {
    cartCount.innerText = cart.length;
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

// renderizar
function renderCart() {
    cartItems.innerHTML = "";

    let total = 0;

    cart.forEach((item, index) => {
        total += Number(item.price);

        cartItems.innerHTML += `
            <div class="cart-item">
                <strong>${item.name}</strong>
                <p>R$ ${item.price}</p>
                <button onclick="removeItem(${index})" class="btn btn-sm btn-danger">
                    Remover
                </button>
            </div>
        `;
    });

    cartTotal.innerText = total.toFixed(2);
}

// remover
function removeItem(index) {
    cart.splice(index, 1);
    updateCart();
}

// adicionar
document.querySelectorAll('.btn-buy').forEach(button => {
    button.addEventListener('click', () => {
        const name = button.dataset.name;
        const price = button.dataset.price;

        cart.push({ name, price });
        updateCart();
    });
});

// abrir
document.querySelector('.cart').addEventListener('click', () => {
    cartSidebar.classList.add('active');
    overlay.classList.add('active');
});

// fechar
function closeCart() {
    cartSidebar.classList.remove('active');
    overlay.classList.remove('active');
}

document.getElementById('close-cart').addEventListener('click', closeCart);
overlay.addEventListener('click', closeCart);

// iniciar
updateCart();


</script>

</body>
</html>
