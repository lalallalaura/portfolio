<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
<nav class="navbar">
    <div class="nav-container">
        <a href="#" class="logo">TERROR<span>SHOP</span></a>
        
        <ul class="nav-links">
            <li><a href="#">Clássicos</a></li>
            <li><a href="#">Slasher</a></li>
            <li><a href="#">Sobrenatural</a></li>
        </ul>

        <div class="nav-actions">
            <a href="#"><i class='bx bx-search'></i></a>
            <a href="#"><i class='bx bx-user'></i></a>
            <a href="#" class="cart">
                <i class='bx bx-shopping-bag'></i>
                <span class="count">0</span>
            </a>
        </div>
    </div>
</nav>

<main class="container">
    <div class="row text-center">
        <div class="col-md-4 mb-4">
            <div class="product-card card h-100">
                <div class="badge-horror">Limited</div>
                <img src="https://occ-0-8407-2219.1.nflxso.net/dnm/api/v6/E8vDc_W8CLv7-yMQu8KMEC7Rrr8/AAAABTVGjJlIal3UArZjcFxuPN1HELBAkPbuKCFcAzG65wYnMkJZxcXJkVIbZrHXqKQkbU6FbfJtTdaeqheaaW-au4XaUUSa85B6dGNt.jpg?r=36a" class="card-img-top" alt="Coraline">
                <div class="card-body">
                    <h3 class="product-title">Réplica Coraline</h3>
                    <p class="product-desc">Boneca com olhos de botão e detalhes em tecido envelhecido.</p>
                    <div class="price-tag">R$ 199,00</div>
                    <button class="btn-buy">Adicionar ao Carrinho</button>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="product-card card h-100">
                <img src="https://i.ytimg.com/vi/BXXr7dW51-Y/maxresdefault.jpg" class="card-img-top" alt="Annabelle">
                <div class="card-body">
                    <h3 class="product-title">Relíquia Annabelle</h3>
                    <p class="product-desc">Cópia fiel da boneca guardada no museu dos Warren.</p>
                    <div class="price-tag">R$ 250,00</div>
                    <button class="btn-buy">Adicionar ao Carrinho</button>
                </div>
            </div>
        </div>
    </div>
</main>
  <!--js-->
<script>
  window.addEventListener("load", () => {
    document.querySelectorAll(".fade-in").forEach(el => {
      el.classList.add("show");
    });
  });
</script>
  <!-- Rodapé -->
  <footer class="bg-dark text-white text-center p-3 mt-5">
    <p>© 2025 - Todos os direitos reservados.</p>
  </footer>

  <!-- Bootstrap JS via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
